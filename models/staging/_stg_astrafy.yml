models:
  - name: stg_astrafy__raw_orders
    description: Cleaned and typed order-level dataset sourced from `raw_orders`.
    columns:
      - name: customer_id
        description: Unique identifier of the customer.
        data_tests:
          - not_null
      - name: order_id
        description: Unique identifier of the order.
        data_tests:
          - not_null
          - unique
      - name: date
        description: Order creation date.
      - name: net_sales
        description: Total net revenue generated by the order.

  - name: stg_astrafy__raw_sales
    description: Cleaned and typed product-line sales dataset sourced from `raw_sales`.
    columns:
      - name: date
        description: Date on which the order line was recorded.
      - name: customer_id
        description: Unique identifier of the customer.
        data_tests:
          - not_null
      - name: order_id
        description: Unique identifier of the order.
        data_tests:
          - not_null
      - name: product_id
        description: Unique identifier of the product included in the order.
      - name: net_sales
        description: Net revenue generated for the specific product line.
      - name: qty
        description: Quantity of the product purchased in the order.
        data_tests:
          - not_null
      
          
